<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buildlogg — Left Column Context Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --app-bg: #F3F4F6;
      --app-shell-bg: #FFFFFF;
      --brand-black: #111827;
      --brand-dark: #374151;
      --brand-mid: #6B7280;
      --brand-muted: #9CA3AF;
      --brand-border: #E5E7EB;
      --brand-border-light: #F3F4F6;
      --brand-surface: #F9FAFB;
      --brand-surface-card: #F5F5F5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--app-bg);
      color: var(--brand-black);
      min-height: 100vh;
    }

    /* Controls */
    .controls {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid var(--brand-border-light);
      backdrop-filter: blur(8px);
    }

    .controls h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--brand-black);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--brand-mid);
    }

    .segmented {
      display: flex;
      background: var(--brand-surface-card);
      border-radius: 8px;
      padding: 3px;
    }

    .segmented button {
      appearance: none;
      border: none;
      background: transparent;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--brand-mid);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .segmented button.active {
      background: #fff;
      color: var(--brand-black);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100vh;
      padding-top: 58px;
    }

    @media (min-width: 1024px) {
      .layout {
        grid-template-columns: 1fr 1fr;
      }
    }

    .left-panel {
      background: var(--brand-surface);
      padding: 48px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 1023px) {
      .left-panel {
        min-height: 50vh;
        padding: 32px 24px;
      }
    }

    .left-content {
      max-width: 400px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .left-content svg {
      width: 100%;
      max-width: 160px;
      color: var(--brand-black);
    }

    .left-content h2 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--brand-black);
      margin-bottom: 8px;
    }

    .left-content p {
      font-size: 14px;
      line-height: 1.5;
      color: var(--brand-mid);
    }

    .extra {
      padding-top: 8px;
    }

    .extra-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .extra-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .extra-stat .value {
      font-size: 22px;
      font-weight: 800;
      color: var(--brand-black);
      letter-spacing: -0.02em;
    }

    .extra-stat .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--brand-mid);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .extra-tip {
      font-size: 14px;
      font-weight: 500;
      color: var(--brand-dark);
    }

    .extra-shortcut {
      display: inline-flex;
      font-size: 14px;
      font-weight: 600;
      color: var(--brand-black);
      cursor: pointer;
    }

    .extra-shortcut:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .extra-status ul {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      list-style: none;
      margin-top: 8px;
    }

    .extra-status li {
      font-size: 11px;
      font-weight: 600;
      color: var(--brand-mid);
      background: var(--brand-surface-card);
      padding: 4px 8px;
      border-radius: 6px;
    }

    .extra-status p {
      font-size: 14px;
      color: var(--brand-dark);
    }

    .right-panel {
      background: var(--app-shell-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      min-height: 50vh;
    }

    .right-frame {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 9/16;
      border: 2px dashed var(--brand-border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--brand-mid);
    }

    .right-frame .screen-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--brand-black);
    }

    .right-frame .screen-meta {
      font-size: 13px;
      color: var(--brand-mid);
    }
  </style>
</head>
<body>
  <div class="controls">
    <h1>Left Column Context</h1>
    <div class="control-group">
      <span class="control-label">Screen</span>
      <div class="segmented" id="screen-tabs">
        <button data-screen="home" class="active">Home</button>
        <button data-screen="jobs">Jobs</button>
        <button data-screen="activity">Activity</button>
        <button data-screen="settings">Settings</button>
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">User</span>
      <div class="segmented" id="user-toggle">
        <button data-user="new" class="active">New</button>
        <button data-user="returning">Returning</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <div class="left-panel">
      <div class="left-content" id="left-content">
        <!-- Content rendered by JS -->
      </div>
    </div>
    <div class="right-panel">
      <div class="right-frame">
        <span class="screen-name" id="right-screen-name">Home</span>
        <span class="screen-meta" id="right-user-state">New user</span>
      </div>
    </div>
  </div>

  <script>
    const state = {
      screen: 'home',
      user: 'new',
    };

    const svgs = {
      homeNew: `<svg viewBox="0 0 200 160" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="60" y="20" width="80" height="120" rx="12" /><line x1="60" y1="45" x2="140" y2="45" /><circle cx="100" cy="125" r="6" /><rect x="72" y="55" width="56" height="36" rx="4" /><line x1="78" y1="65" x2="122" y2="65" /><line x1="78" y1="73" x2="110" y2="73" /><line x1="78" y1="81" x2="104" y2="81" /><rect x="145" y="55" width="40" height="34" rx="4" /><line x1="145" y1="65" x2="185" y2="65" /><line x1="153" y1="72" x2="153" y2="72" /><line x1="165" y1="72" x2="165" y2="72" /><line x1="177" y1="72" x2="177" y2="72" /><line x1="153" y1="80" x2="153" y2="80" /><line x1="165" y1="80" x2="165" y2="80" /><line x1="177" y1="80" x2="177" y2="80" /><rect x="145" y="100" width="48" height="30" rx="4" /><line x1="145" y1="110" x2="193" y2="110" /><line x1="153" y1="120" x2="170" y2="120" /></g></svg>`,
      homeReturning: `<svg viewBox="0 0 200 80" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 60 L40 50 L70 55 L100 35 L130 40 L160 25 L190 30" /><rect x="20" y="10" width="160" height="24" rx="4" /><line x1="20" y1="18" x2="180" y2="18" /><line x1="45" y1="10" x2="45" y2="34" /><line x1="75" y1="10" x2="75" y2="34" /><line x1="105" y1="10" x2="105" y2="34" /><line x1="135" y1="10" x2="135" y2="34" /><line x1="165" y1="10" x2="165" y2="34" /></g></svg>`,
      jobsNew: `<svg viewBox="0 0 240 100" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="20" cy="50" r="12" /><text x="20" y="80" text-anchor="middle" font-size="10" fill="currentColor" stroke="none">Lead</text><line x1="36" y1="50" x2="56" y2="50" /><polyline points="50 44 56 50 50 56" /><rect x="60" y="38" width="36" height="24" rx="4" /><text x="78" y="80" text-anchor="middle" font-size="10" fill="currentColor" stroke="none">Quote</text><line x1="100" y1="50" x2="120" y2="50" /><polyline points="114 44 120 50 114 56" /><rect x="124" y="38" width="36" height="24" rx="4" /><text x="142" y="80" text-anchor="middle" font-size="10" fill="currentColor" stroke="none">Booked</text><line x1="164" y1="50" x2="184" y2="50" /><polyline points="178 44 184 50 178 56" /><circle cx="200" cy="50" r="12" /><text x="200" y="80" text-anchor="middle" font-size="10" fill="currentColor" stroke="none">Paid</text></g></svg>`,
      jobsReturning: `<svg viewBox="0 0 160 140" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20 L140 20 L100 70 L60 70 Z" /><line x1="80" y1="70" x2="80" y2="110" /><rect x="60" y="110" width="40" height="16" rx="4" /></g></svg>`,
      activityNew: `<svg viewBox="0 0 200 120" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="30" y1="20" x2="30" y2="100" /><circle cx="30" cy="30" r="6" /><rect x="50" y="22" width="120" height="16" rx="4" /><line x1="58" y1="28" x2="100" y2="28" /><circle cx="30" cy="60" r="6" /><rect x="50" y="52" width="120" height="16" rx="4" /><line x1="58" y1="58" x2="90" y2="58" /><circle cx="30" cy="90" r="6" /><rect x="50" y="82" width="120" height="16" rx="4" /><line x1="58" y1="88" x2="110" y2="88" /></g></svg>`,
      activityReturning: `<svg viewBox="0 0 200 100" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 80 L40 75 L70 60 L100 65 L130 45 L160 50 L190 30" /><rect x="20" y="10" width="160" height="24" rx="4" /><line x1="20" y1="18" x2="180" y2="18" /><line x1="45" y1="10" x2="45" y2="34" /><line x1="75" y1="10" x2="75" y2="34" /><line x1="105" y1="10" x2="105" y2="34" /><line x1="135" y1="10" x2="135" y2="34" /><circle cx="58" cy="25" r="2" fill="currentColor" stroke="none" /><circle cx="88" cy="25" r="2" fill="currentColor" stroke="none" /><circle cx="118" cy="25" r="2" fill="currentColor" stroke="none" /><circle cx="148" cy="25" r="2" fill="currentColor" stroke="none" /></g></svg>`,
      settingsNew: `<svg viewBox="0 0 160 140" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="20" y="20" width="120" height="100" rx="6" /><line x1="20" y1="40" x2="140" y2="40" /><circle cx="34" cy="56" r="6" /><polyline points="30 56 32 58 38 52" /><line x1="48" y1="56" x2="120" y2="56" /><circle cx="34" cy="80" r="6" /><polyline points="30 80 32 82 38 76" /><line x1="48" y1="80" x2="120" y2="80" /><circle cx="34" cy="104" r="6" /><polyline points="30 104 32 106 38 100" /><line x1="48" y1="104" x2="120" y2="104" /></g></svg>`,
      settingsReturning: `<svg viewBox="0 0 140 140" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="70" cy="70" r="28" /><circle cx="70" cy="70" r="12" /><line x1="70" y1="14" x2="70" y2="30" /><line x1="70" y1="110" x2="70" y2="126" /><line x1="14" y1="70" x2="30" y2="70" /><line x1="110" y1="70" x2="126" y2="70" /><line x1="28" y1="28" x2="39" y2="39" /><line x1="101" y1="101" x2="112" y2="112" /><line x1="28" y1="112" x2="39" y2="101" /><line x1="101" y1="39" x2="112" y2="28" /><circle cx="105" cy="35" r="14" /><polyline points="98 35 103 40 112 29" /></g></svg>`,
    };

    const content = {
      home: {
        new: {
          headline: 'Your workday, in one place',
          body: "Track today's jobs, send quotes, and record payments as you move between sites.",
          svg: svgs.homeNew,
        },
        returning: {
          headline: "Today's snapshot",
          body: 'Active jobs and anything that needs a nudge show up here.',
          svg: svgs.homeReturning,
          extra: 'homeStats',
        },
      },
      jobs: {
        new: {
          headline: 'A job is a customer journey',
          body: "Move jobs through each stage so you always know what's quoted, booked, or waiting to be paid.",
          svg: svgs.jobsNew,
        },
        returning: {
          headline: 'Pipeline view',
          body: 'Use the tabs to zoom in on active or unpaid work.',
          svg: svgs.jobsReturning,
          extra: 'tip',
          extraText: 'Pro tip: tap a status group to expand or collapse it.',
        },
      },
      activity: {
        new: {
          headline: 'Everything you did, recorded',
          body: 'Activity automatically logs quotes sent, payments, and status changes so you can look back later.',
          svg: svgs.activityNew,
        },
        returning: {
          headline: 'Recent highlights',
          body: 'Patterns from the last 30 days appear here.',
          svg: svgs.activityReturning,
          extra: 'activityStats',
        },
      },
      settings: {
        new: {
          headline: 'Set up once, save time every quote',
          body: 'Add your business name, trade, and default payment terms so quotes look professional.',
          svg: svgs.settingsNew,
          extra: 'shortcut',
          extraText: 'Start with business name →',
        },
        returning: {
          headline: 'Your defaults',
          body: 'These details appear on every quote you send.',
          svg: svgs.settingsReturning,
          extra: 'status',
        },
      },
    };

    const extras = {
      homeStats: `<div class="extra-stats"><div class="extra-stat"><span class="value">3</span><span class="label">Active</span></div><div class="extra-stat"><span class="value">2</span><span class="label">Today</span></div><div class="extra-stat"><span class="value">£840</span><span class="label">Unpaid</span></div></div>`,
      activityStats: `<div class="extra-stats" style="grid-template-columns: repeat(2, 1fr);"><div class="extra-stat"><span class="value">3</span><span class="label">Payments this week</span></div><div class="extra-stat"><span class="value">2</span><span class="label">Done today</span></div></div>`,
      tip: (text) => `<p class="extra-tip">${text}</p>`,
      shortcut: (text) => `<span class="extra-shortcut">${text}</span>`,
      status: `<div class="extra-status"><p>Still to set:</p><ul><li>Business name</li><li>Phone</li></ul></div>`,
    };

    function render() {
      const variant = content[state.screen][state.user];
      let extraHtml = '';
      if (variant.extra) {
        if (variant.extra === 'homeStats') extraHtml = extras.homeStats;
        else if (variant.extra === 'activityStats') extraHtml = extras.activityStats;
        else if (variant.extra === 'status') extraHtml = extras.status;
        else extraHtml = extras[variant.extra](variant.extraText);
      }

      document.getElementById('left-content').innerHTML = `
        <div>${variant.svg}</div>
        <div>
          <h2>${variant.headline}</h2>
          <p>${variant.body}</p>
        </div>
        ${extraHtml ? `<div class="extra">${extraHtml}</div>` : ''}
      `;

      document.getElementById('right-screen-name').textContent = state.screen.charAt(0).toUpperCase() + state.screen.slice(1);
      document.getElementById('right-user-state').textContent = state.user === 'new' ? 'New user' : 'Returning user';

      document.querySelectorAll('#screen-tabs button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.screen === state.screen);
      });
      document.querySelectorAll('#user-toggle button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.user === state.user);
      });
    }

    document.getElementById('screen-tabs').addEventListener('click', (e) => {
      if (e.target.dataset.screen) {
        state.screen = e.target.dataset.screen;
        render();
      }
    });

    document.getElementById('user-toggle').addEventListener('click', (e) => {
      if (e.target.dataset.user) {
        state.user = e.target.dataset.user;
        render();
      }
    });

    render();
  </script>
</body>
</html>
