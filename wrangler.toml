#:schema node_modules/wrangler/config-schema.json
name = "tradepadapp"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Static assets — serves the Vite build output
[assets]
directory = "./dist"
binding = "ASSETS"

# Use 404-page instead of single-page-application so Functions can handle
# /api/* and /book/* paths without the SPA fallback intercepting them first.
# The _middleware.js handles SPA routing for /app/* explicitly.
not_found_handling = "404-page"

# Build configuration for Cloudflare Workers Git integration
[build]
command = "npm run build"
